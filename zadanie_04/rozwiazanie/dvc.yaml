stages:
  download_data:
    cmd: python src/download_data.py
    deps:
      - src/download_data.py
    params:
      - data.dataset_id
    outs:
      - data/titanic.csv

  prepare_data:
    cmd: python src/prepare_data.py
    deps:
      - src/prepare_data.py
      - data/titanic.csv
    params:
      - prepare.test_size
      - prepare.random_state
    outs:
      - data/train.csv
      - data/test.csv

  train_model:
    cmd: python src/train_model.py
    deps:
      - src/train_model.py
      - data/train.csv
    params:
      - model.n_estimators
      - model.max_depth
      - model.random_state
    outs:
      - models/model.pkl

  evaluate:
    cmd: python src/evaluate.py
    deps:
      - src/evaluate.py
      - models/model.pkl
      - data/test.csv
    metrics:
      - metrics.json:
          cache: false
