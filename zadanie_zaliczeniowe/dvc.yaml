stages:
  download_data:
    cmd: python main.py download_data
    deps:
      - src/data_loader.py
      - src/pipeline.py
    outs:
      - data/raw/penguins.csv

  prepare_data:
    cmd: python main.py prepare_data
    deps:
      - data/raw/penguins.csv
      - src/preprocessor.py
      - src/pipeline.py
    outs:
      - data/processed/train.csv
      - data/processed/test.csv
      - models/encoder.pkl

  train_model:
    cmd: python main.py train_model
    deps:
      - data/processed/train.csv
      - src/trainer.py
      - src/pipeline.py
      - config/config.yaml
    outs:
      - models/model.pkl

  evaluate_model:
    cmd: python main.py evaluate_model
    deps:
      - data/processed/test.csv
      - models/model.pkl
      - src/pipeline.py
    metrics:
      - metrics/metrics.json:
          cache: false

  register_bentoml:
    cmd: python main.py register_bentoml
    deps:
      - models/model.pkl
      - models/encoder.pkl
      - src/pipeline.py